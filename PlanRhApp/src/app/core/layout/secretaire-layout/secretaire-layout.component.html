<div class="flex min-h-screen">
  <!-- Sidebar for secretaire -->
  <app-sec-side-bar *ngIf="isSec"></app-sec-side-bar>

  <div class="flex-1 flex flex-col ml-[18%] bg-white min-w-0">
    <!-- Top bar fixed -->
    <app-top-bar *ngIf="isSec" class="fixed top-0 left-[18%] right-0 z-10"></app-top-bar>

    <!-- Main content -->
    <div class="flex-1 p-4 bg-[#fcfbfb]" style="padding-top: 72px; min-height: calc(100vh - 56px);">
      <router-outlet></router-outlet>
    </div>
  </div>
</div>
